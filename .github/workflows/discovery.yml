name: Auto-Discovery Scan

# Runs the Opti-Battery monitor on a schedule: re-screens the Materials
# Project for all 5 specs, mines recent arXiv papers, and commits any new
# champions / literature signals back to the repo. Also runnable on demand.
on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch: {}

# Needed so the workflow can commit updated state/history back.
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run discovery scan (+ arXiv papers)
        env:
          MP_API_KEY: ${{ secrets.MP_API_KEY }}
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: python3 run_monitor.py --papers

      - name: Commit updated discovery state
        run: |
          git config user.name "opti-battery-bot"
          git config user.email "bot@users.noreply.github.com"
          git add discovery_state.json discovery_history.json
          if git diff --staged --quiet; then
            echo "No discovery changes to commit."
          else
            git commit -m "chore(discovery): update champions & literature feed [skip ci]"
            git push
          fi
